<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
</head>

<body>
    <!-- Entry Screen -->
    <div id="user-entry" class="screen active">
        <div class="container welcome-container">
            <div class="welcome-header">
                <div class="logo-wrapper">
                    <div class="pulse-ring"></div>
                    <img src="img/logo_withoutbg.png" alt="app logo" class="app-logo">
                </div>
                <h1 class="welcome-title">Quick<span>Chat</span><span class="dot">.</span></h1>
                <p class="welcome-subtitle">Connect anonymously. Chat instantly.</p>
            </div>
            <div class="welcome-form">
                <div class="modern-input-group">
                    <input type="text" id="username" class="modern-input" placeholder="What's your name?" autocomplete="off" required>
                    <div class="input-highlight"></div>
                </div>
                <button id="start-chat" class="gradient-btn modern-btn">
                    <span class="btn-text">Get started</span>
                    <div class="arrow-wrapper">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Room Selection Screen -->
    <div id="room-selection" class="screen">
        <div class="top-bar">
            <h2 class="welcome-title top-title">Quick<span>Chat</span><span class="dot">.</span></h2>
            <label class="theme-container" title="Toggle Theme">
                <input id="theme-toggle" type="checkbox">
                <svg viewBox="0 0 384 512" height="1em" xmlns="http://www.w3.org/2000/svg" class="moon"><path d="M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z"></path></svg>
                <svg viewBox="0 0 512 512" height="1em" xmlns="http://www.w3.org/2000/svg" class="sun"><path d="M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z"></path></svg>
            </label>
        </div>
        <div class="container">
            <div class="app-header">
                <div class="user-greeting">
                    <span>Hey</span>
                    <span class="user-name" id="display-username"></span>
                    <button class="edit-name-btn" id="edit-name">
                        <i class="fas fa-pencil-alt"></i>
                    </button>
                </div>
                <h2>Choose a Chat Room</h2>
            </div>
            <div class="room-options">
                <div class="input-group">
                    <i class="fas fa-door-open"></i>
                    <input type="text" id="room-name" placeholder="Enter room name">
                    <button id="share-room" class="share-btn" title="Share Room">
                        <i class="fas fa-share-alt"></i>
                    </button>
                </div>
                <div class="button-group">
                    <button id="join-room" class="gradient-btn">
                        <span class="btn-text">Join Room</span>
                        <div class="arrow-wrapper">
                            <i class="fas fa-sign-in-alt"></i>
                        </div>
                    </button>
                    <button id="random-room" class="gradient-btn">
                        <span class="btn-text">Random Room</span>
                        <div class="arrow-wrapper">
                            <i class="fas fa-random"></i>
                        </div>
                    </button>
                </div>
            </div>
        </div>
        <!-- Bottom Navigation -->
        <div class="bottom-nav" id="room-bottom-nav">
            <button class="nav-btn active" id="nav-home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-btn" id="nav-ai">
                <i class="fas fa-robot"></i>
                <span>AI</span>
            </button>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen">
        <div class="chat-header">
            <button id="back-to-rooms" class="back-button">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="room-title">
                <h2 id="current-room">Room Name</h2>
                <div class="room-info">
                    <i class="fas fa-users"></i>
                    <span id="online-count">0</span>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Type your message...">
            <button id="send-message" class="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- AI Chat Screen -->
    <div id="ai-chat-screen" class="screen">
        <div class="chat-header">
            <button id="back-to-rooms-ai" class="back-button">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="room-title">
                <h2>AI Assistant</h2>
                <div class="room-info">
                    <i class="fas fa-robot"></i>
                    <span>AI</span>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="ai-messages"></div>
        <div class="chat-input">
            <input type="text" id="ai-message-input" placeholder="Chat with AI...">
            <button id="ai-send-message" class="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- In-app Popup Modal -->
    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <p>No active rooms found. Create a new room!</p>
            <button id="closePopup" class="gradient-btn"><span class="btn-text">OK</span></button>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>

</html>
